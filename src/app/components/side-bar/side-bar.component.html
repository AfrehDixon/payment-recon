<div class="layout-wrapper" [class.collapsed]="isCollapsed">
  <aside class="sidebar">
    <!-- Logo Section -->
    <div class="sidebar-header">
      <a class="logo-wrapper">
        <!-- <img *ngIf="logo" [src]="logo" alt="Logo" class="logo" /> -->
      </a>
      <button class="collapse-btn" (click)="toggleSidebar()" style="background-color: red;">
        <i class="ri-arrow-drop-right-line icon"></i>
      </button>
    </div>

    <!-- Navigation Menu - Flat structure without dropdowns -->
    <nav class="sidebar-nav">
      <ul class="nav-list">
        <!-- All menu items listed directly -->
        <li *ngFor="let menuItem of menuItems" 
            class="nav-item"
            [class.active]="isActive(menuItem.path)">
          <a class="nav-link" 
             [routerLink]="[menuItem.path]" 
             [title]="isCollapsed ? menuItem.title : ''">
            <!-- Add appropriate icon based on parent module or default -->
            <i [class]="getIconForMenuItem(menuItem)"></i>
            <span class="nav-text" *ngIf="!isCollapsed">{{ menuItem.title }}</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Bottom Actions -->
    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()" title="Logout">
        <i class="bi bi-box-arrow-right"></i>
        <span *ngIf="!isCollapsed">Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content">
    <!-- Mobile Header -->
    <div class="mobile-header">
      <button class="mobile-toggle" (click)="toggleSidebar()">
        <i class="bi bi-list"></i>
      </button>
      <div class="mobile-logo">
        <img *ngIf="logo" [src]="logo" alt="Logo" />
      </div>
      <div class="mobile-user">
        <i class="bi bi-person-circle"></i>
      </div>
    </div>

    <!-- Content Area -->
    <div class="content-wrapper">
      <ng-content></ng-content>
    </div>
  </main>
</div>
